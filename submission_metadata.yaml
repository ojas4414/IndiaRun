ai_usage_summary: |
  Used Gemini / Antigravity IDE as an agentic coding assistant to architect and implement the hybrid deterministic ranker, skill graph logic, and honeypot detector. AI tools were not used at runtime for the ranking pipeline (no LLM API calls are made by rank.py).

methodology_summary: |
  A two-phase hybrid deterministic ranking pipeline. Phase 1 (offline pre-computation): Embed candidates via sentence-transformers, build FAISS index, detect and exclude honeypots (impossible experience spans). Phase 2 (ranking, CPU, no-network, <5min): Retrieve top-500 semantic matches via FAISS. Score these using a deterministic hybrid heuristic: BFS-based skill graph transferability (25%), semantic similarity (25%), title/trajectory alignment to strictly enforce JD "keyword trap" (20%), and Redrob behavioral signals (20%). Strict disqualifiers filter out consulting-only careers and completely irrelevant roles. Exactly 100 top candidates are maintained in a bounded min-heap and output with templated, feature-derived reasoning.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
