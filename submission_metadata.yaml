ai_usage_summary: |
  AI coding assistants (Claude Code and, earlier, Gemini/Antigravity IDE) were
  used as pair-programmers to implement and refactor the pipeline, and to design
  the evaluation harness. All architecture decisions, the weighting strategy
  (tuned from the ablation), and the trap-defense design were human-directed and
  are defensible from first principles. No LLM or network calls are made at
  ranking time (rank.py is fully offline and deterministic).

methodology_summary: |
  A deterministic retrieve-then-rerank pipeline. Precomputation (offline, no time
  limit): filter impossible "honeypot" profiles via date/tenure checks, embed
  candidates with sentence-transformers (all-MiniLM-L6-v2), build a FAISS index.
  Ranking (CPU, offline, ~40s): (1) FAISS retrieves a top-2000 semantic funnel for
  recall; (2) hard disqualifiers drop off-domain / consulting-only / CV-speech-only
  / title-chaser profiles; (3) survivors are scored by a deterministic hybrid --
  trajectory DP alignment (35%, the dominant JD-fit signal), skill-graph BFS with
  verified-skill boost (22%), behavioral availability signals (18%), query-attention
  sentence relevance with contrastive anti-fit facets (15%), and semantic similarity
  (10%, mostly a recall signal); (4) behavioral-twin clusters are disambiguated so
  the most-available near-duplicate leads. Weights were tuned with an offline
  evaluation harness (NDCG/MRR/MAP vs a recruiter rubric, per-component ablation,
  and an adversarial keyword-stuffing test). Output is the top-100 with dynamic,
  evidence-grounded reasoning.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
